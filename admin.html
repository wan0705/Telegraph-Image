<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Telegraph-Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/theme-chalk/index.css"
    integrity="sha256-ghr1zmXTODLKl1HULQd6fq1MIe7m3FJiNTOCT8sddLM=" crossorigin="anonymous">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #d1fae5;
      --primary-bg: #ecfdf5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-lg: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --border-light: #1e293b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg) !important;
      color: var(--text);
      transition: var(--transition);
      margin: 0; padding: 0;
    }

    /* ========== 固定顶栏 ========== */
    .custom-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    [data-theme="dark"] .custom-header {
      background: rgba(15,23,42,0.9);
    }
    .custom-header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 12px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .custom-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 700;
      color: var(--text); text-decoration: none;
    }
    .custom-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.9rem;
    }
    .custom-nav {
      display: flex; gap: 8px; align-items: center;
    }
    .custom-nav a, .custom-nav button {
      padding: 7px 14px; border-radius: 8px;
      color: var(--text-secondary); text-decoration: none;
      font-weight: 500; font-size: 0.85rem;
      transition: var(--transition);
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid transparent; background: transparent;
      cursor: pointer; font-family: inherit;
    }
    .custom-nav a:hover, .custom-nav button:hover {
      color: var(--primary); background: var(--primary-bg);
      border-color: var(--primary-light);
    }
    .custom-theme-btn {
      width: 34px; height: 34px; padding: 0 !important;
      justify-content: center;
    }

    /* 给 Element 容器加顶部 padding 避开固定顶栏 */
    .el-container {
      padding-top: 60px;
      background: var(--bg) !important;
    }

    /* ========== Element 组件样式覆盖 ========== */
    .el-header {
      background: transparent !important;
      line-height: 60px !important;
      padding: 0 24px !important;
      height: auto !important;
    }
    .el-header > div {
      font-size: 1.5rem !important;
      font-weight: 700 !important;
      color: var(--text) !important;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 0;
    }
    .el-header .el-button {
      border-radius: 8px !important;
      font-weight: 500 !important;
      transition: var(--transition) !important;
    }
    .el-button--warning {
      background: #fffbeb !important; color: #f59e0b !important;
      border: 1px solid #fde68a !important;
    }
    .el-button--warning:hover {
      background: #f59e0b !important; color: white !important;
    }
    .el-button--primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
      border: none !important;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3) !important;
    }
    .el-button--primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16,185,129,0.4) !important;
    }
    .el-button--info {
      background: var(--surface-hover) !important; color: var(--text-secondary) !important;
      border: 1px solid var(--border) !important;
    }
    .el-button--info:hover {
      border-color: var(--primary) !important; color: var(--primary) !important;
      background: var(--primary-bg) !important;
    }
    .el-button--danger {
      background: #fef2f2 !important; color: #ef4444 !important;
      border: 1px solid #fecaca !important;
    }
    .el-button--danger:hover {
      background: #ef4444 !important; color: white !important;
    }

    .el-main {
      background: var(--bg) !important;
      padding: 0 24px 40px !important;
    }

    /* 统计卡片 */
    .el-row { margin-bottom: 20px !important; }
    .el-card {
      border-radius: var(--radius-lg) !important;
      border: 1px solid var(--border) !important;
      background: var(--surface) !important;
      color: var(--text) !important;
      box-shadow: var(--shadow-sm) !important;
      transition: var(--transition) !important;
    }
    .el-card:hover {
      box-shadow: var(--shadow) !important;
      border-color: var(--primary-light) !important;
    }
    .el-card__body {
      padding: 20px 24px !important;
      color: var(--text) !important;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* 表格 */
    .el-table {
      background: transparent !important;
      border-radius: var(--radius) !important;
    }
    .el-table th {
      background: var(--bg) !important;
      color: var(--text-secondary) !important;
      font-weight: 600 !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 14px 16px !important;
    }
    .el-table td {
      border-bottom: 1px solid var(--border) !important;
      padding: 12px 16px !important;
      background: var(--surface) !important;
      color: var(--text) !important;
    }
    .el-table--enable-row-hover .el-table__body tr:hover > td {
      background: var(--surface-hover) !important;
    }
    .el-table::before { display: none; }
    .el-table__empty-block { background: var(--surface); }
    .el-table__empty-text { color: var(--text-muted); }

    /* 图片 */
    .el-image__inner.el-image__inner {
      width: 100%;
      height: 90px;
      border-radius: 8px;
      object-fit: cover;
    }
    .el-image { text-align: center; }

    /* 标签 */
    .el-tag {
      border-radius: 6px !important; font-weight: 500 !important;
      border: none !important;
    }
    .el-tag--medium { padding: 0 10px !important; height: 28px !important; line-height: 26px !important; }

    /* 输入框 */
    .el-input__inner {
      border-radius: 8px !important;
      border: 1.5px solid var(--border) !important;
      background: var(--bg) !important;
      color: var(--text) !important;
    }
    .el-input__inner:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1) !important;
    }
    .el-input__inner::placeholder { color: var(--text-muted) !important; }

    /* 加载更多按钮 */
    .el-button[style*="margin-top:16px"] {
      display: block !important;
      width: 200px !important;
      margin: 16px auto 0 !important;
      border-radius: 10px !important;
      background: var(--bg) !important;
      border: 1.5px solid var(--border) !important;
      color: var(--text) !important;
      font-weight: 500 !important;
    }
    .el-button[style*="margin-top:16px"]:hover {
      border-color: var(--primary) !important;
      color: var(--primary) !important;
      background: var(--primary-bg) !important;
    }

    /* Message */
    .el-message {
      border-radius: 12px !important;
      box-shadow: var(--shadow-lg) !important;
      border: 1px solid var(--border) !important;
      background: var(--surface) !important;
    }
    .el-message--success { border-left: 4px solid var(--primary) !important; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* 响应式 */
    @media (max-width: 768px) {
      .custom-header-inner { padding: 10px 16px; }
      .custom-logo { font-size: 1rem; }
      .custom-logo-icon { width: 30px; height: 30px; }
      .custom-nav a, .custom-nav button {
        padding: 5px 10px; font-size: 0.75rem;
      }
      .custom-nav span { display: none; }
      .el-container { padding-top: 52px; }
      .el-header > div { font-size: 1.2rem !important; }
      .el-main { padding: 0 12px 30px !important; }
      .el-card__body { padding: 14px 16px !important; font-size: 1rem; }
      .el-table td { padding: 8px !important; }
      .el-button--mini { padding: 5px 8px !important; font-size: 0.7rem !important; }
      .el-image__inner.el-image__inner { height: 70px; }
    }
  </style>
</head>
<body>
  <!-- 自定义固定顶栏 -->
  <div class="custom-header">
    <div class="custom-header-inner">
      <a href="/" class="custom-logo">
        <div class="custom-logo-icon"><i class="fas fa-cloud-upload-alt"></i></div>
        <span>Telegraph-Image</span>
      </a>
      <div class="custom-nav">
        <a href="./admin-imgtc.html"><i class="fas fa-th"></i> <span>网格</span></a>
        <a href="./admin-waterfall.html"><i class="fas fa-images"></i> <span>瀑布</span></a>
        <button class="custom-theme-btn" id="themeToggle" title="切换主题">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 原始 Element 结构完全保留 -->
  <div id="app">
    <el-container>
      <el-header>
        <div>
          Dashboard
          <span>
            <a href="./admin-imgtc.html">
              <el-button size="mini" type="warning">网格视图</el-button>
            </a>
            <a href="./admin-waterfall.html">
              <el-button size="mini" type="primary">瀑布流</el-button>
            </a>
            <el-button v-if="showLogoutButton" size="mini" type="info" @click="handleLogout()">退出登录</el-button>
          </span>
        </div>
      </el-header>
      <el-main>
        <el-row :gutter="12">
          <el-col :span="24">
            <el-card shadow="always">
              记录总数量: {{ Number }}
            </el-card>
          </el-col>
        </el-row>
        <template>
          <el-table :data="tableData.filter(data => !search || data.name.toLowerCase().includes(search.toLowerCase()))"
            style="width: 100%">
            <el-table-column label="name" prop="name">
            </el-table-column>
            <el-table-column label="preview" prop="preview" align="center">
              <template slot-scope="scope">
                <video v-if="scope.row.name.indexOf('.mp4')>0" style="width: 100%; height: 180px;" controls>
                  <source :src="'/file/'+scope.row.name" type="video/mp4">
                </video>
                <el-image v-else style="width: 100%; height: 100%;" :src="'/file/'+scope.row.name" :zoom-rate="1.2"
                  :preview-src-list="['/file/'+scope.row.name]" fit="cover" lazy />
              </template>
            </el-table-column>
            <el-table-column label="data" prop="data">
              <template slot-scope="scope">
                <el-popover trigger="hover" placement="top">
                  <p>{{ scope.row.metadata }}</p>
                  <div slot="reference" class="name-wrapper">
                    <el-tag size="medium">{{ scope.row.metadata }}</el-tag>
                  </div>
                </el-popover>
              </template>
            </el-table-column>
            <el-table-column align="right">
              <template slot="header" slot-scope="scope">
                <el-input v-model="search" @input="handleSearch" size="mini" placeholder="输入关键字搜索" />
              </template>
              <template slot-scope="scope">
                <el-button size="mini" type="primary" @click="handleCopy(scope.$index,scope.row.name)">复制地址</el-button>
                <el-button size="mini" type="primary" @click="handleWhite(scope.$index,scope.row.name)">白名单</el-button>
                <el-button size="mini" type="info" @click="handleBlock(scope.$index,scope.row.name)">黑名单</el-button>
                <el-button size="mini" type="danger" @click="handleDelete(scope.$index,scope.row.name)">删除</el-button>
              </template>
            </el-table-column>
          </el-table>
          <el-button v-if="nextCursor" style="margin-top:16px" @click="loadMore">加载更多</el-button>
        </template>
      </el-main>
    </el-container>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"
    integrity="sha256-kXTEJcRFN330VirZFl6gj9+UM6gIKW195fYZeR3xDhc=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/index.js"
    integrity="sha256-OFVFYfqhQ9nDnKh+NfIsefpy/fnjTwkK909ZYgo45nw=" crossorigin="anonymous"></script>
  <script>
    var app = new Vue({
      el: '#app',
      data: {
        Number: 0,
        WhiteList: 0,
        BlackList: 0,
        showLogoutButton: false,
        tableData: [],
        nextCursor: null,
        dialogFormVisible: false,
        formLabelWidth: '120px',
        form: { name: '', id: '' },
        search: '',
        password: '123456',
        searchTimer: null
      },
      methods: {
        handleBlock(index, key) {
          console.log(key);
          if (confirm("确认加入黑名单吗?")) {
            console.log("Yes")
            var requestOptions = {
              method: 'GET',
              redirect: 'follow',
              credentials: 'include'
            };
            fetch("./api/manage/block/" + key, requestOptions)
              .then(response => response.text())
              .then(result => {
                console.log(result);
                this.tableData[index].metadata = result;
              })
              .catch(error => { alert("An error occurred while synchronizing data with the server, please check the network connection"); console.log('error', error) });
          } else {
            console.log("No")
          }
        },
        handleDelete(index, key) {
          console.log(key);
          if (confirm("确认删除该条记录吗?")) {
            console.log("Yes")
            var requestOptions = {
              method: 'GET',
              redirect: 'follow',
              credentials: 'include'
            };
            fetch("./api/manage/delete/" + key, requestOptions)
              .then(response => response.text())
              .then(result => { console.log(result); this.tableData.remove(index); })
              .catch(error => { alert("An error occurred while synchronizing data with the server, please check the network connection"); console.log('error', error) });
          } else {
            console.log("No")
          }
        },
        handleWhite(index, key) {
          console.log(key);
          if (confirm("确认加入白名单吗?")) {
            console.log("Yes")
            var requestOptions = {
              method: 'GET',
              redirect: 'follow',
              credentials: 'include'
            };
            fetch("./api/manage/white/" + key, requestOptions)
              .then(response => response.text())
              .then(result => { console.log(result); this.tableData[index].metadata = result; })
              .catch(error => { alert("An error occurred while synchronizing data with the server, please check the network connection"); console.log('error', error) });
          } else {
            console.log("No")
          }
        },
        handleLogout() {
          window.location.href = "./api/manage/logout";
        },
        handleCopy(index, key) {
          const text = `${document.location.origin}/file/${key}`;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text);
          } else {
            const textarea = document.createElement('textarea');
            document.body.appendChild(textarea);
            textarea.style.position = 'fixed';
            textarea.style.clip = 'rect(0 0 0 0)';
            textarea.style.top = '10px';
            textarea.value = text;
            textarea.select();
            document.execCommand('copy', true);
            document.body.removeChild(textarea);
          }
          this.$message({
            message: '复制文件链接成功~',
            type: 'success'
          });
        },
        handleSearch() {
          clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => {
            this.tableData = [];
            this.nextCursor = null;
            const opts = { method: 'GET', redirect: 'follow', credentials: 'include' };
            const base = this.search
              ? `./api/manage/list?limit=100&prefix=${encodeURIComponent(this.search)}`
              : `./api/manage/list?limit=100`;
            fetch(base, opts)
              .then(r => r.json())
              .then(result => {
                this.tableData = result.keys || [];
                this.nextCursor = result.list_complete ? null : result.cursor;
                this.Number = this.tableData.length;
              })
              .catch(() => alert("搜索失败，请检查网络"));
          }, 300);
        },
        loadMore() {
          const opts = { method: 'GET', redirect: 'follow', credentials: 'include' };
          const base = this.search
            ? `./api/manage/list?limit=100&prefix=${encodeURIComponent(this.search)}`
            : `./api/manage/list?limit=100`;
          const url = this.nextCursor
            ? `${base}&cursor=${encodeURIComponent(this.nextCursor)}`
            : base;

          fetch(url, opts)
            .then(r => r.json())
            .then(result => {
              this.tableData = this.tableData.concat(result.keys || []);
              this.nextCursor = result.list_complete ? null : result.cursor;
              this.Number = this.tableData.length;
            })
            .catch(() => alert("同步失败，请检查网络"));
        },
      },

      mounted() {
        Array.prototype.remove = function (from, to) {
          var rest = this.slice((to || from) + 1 || this.length);
          this.length = from < 0 ? this.length + from : from;
          return this.push.apply(this, rest);
        };

        var requestOptions = {
          method: 'GET',
          redirect: 'follow',
          credentials: 'include'
        };

        fetch("./api/manage/check", requestOptions)
          .then(response => response.text())
          .then(result => {
            console.log(result);
            if (result == "true") {
              this.showLogoutButton = true;
            } else if (result == "Not using basic auth.") {
            }
            else {
              window.location.href = "./api/manage/login";
            }
          })
          .catch(error => { alert("An error occurred while synchronizing data with the server, please check the network connection"); console.log('error', error) });

        fetch("./api/manage/list?limit=100", requestOptions)
          .then(response => {
            if (response.status == 401) {
              alert("请先登录");
              window.location.href = "./api/manage/login";
            }
            else {
              return response;
            }
          })
          .then(response => response.json())
          .then(result => {
            this.tableData = result.keys || [];
            this.nextCursor = result.list_complete ? null : result.cursor;
            console.log(result);
            this.Number = this.tableData.length;
          })
          .catch(error => { alert("An error occurred while synchronizing data with the server, please check the network connection"); console.log('error', error) });
      }
    });

    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.className = 'fas fa-sun';
    }
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        themeIcon.className = 'fas fa-moon';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        themeIcon.className = 'fas fa-sun';
      }
    });
  </script>
</body>
</html>
