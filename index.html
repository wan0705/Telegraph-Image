<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegraph-Image | 免费图床</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0297f8;
            --primary-dark: #0075ff;
            --primary-light: #e6f4ff;
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface-hover: #f5f7fa;
            --text: #1a1a2e;
            --text-secondary: #5e6878;
            --text-muted: #8c9aab;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --border-light: #1e293b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: var(--transition);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-decoration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -30%; right: -20%;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(2,151,248,0.15) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(2,151,248,0.08) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(2deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        /* 头部 */
        .header {
            position: relative; z-index: 10;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1400px; margin: 0 auto;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.4rem; font-weight: 700;
            color: var(--primary); text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem;
            box-shadow: var(--shadow);
        }
        .nav-links {
            display: flex; gap: 8px; align-items: center;
        }
        .nav-link {
            padding: 8px 16px; border-radius: var(--radius-sm);
            color: var(--text-secondary); text-decoration: none;
            font-weight: 500; font-size: 0.9rem;
            transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        .nav-link:hover { color: var(--primary); background: var(--surface-hover); }
        .theme-toggle {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--surface);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 1rem;
        }
        .theme-toggle:hover { border-color: var(--primary); color: var(--primary); transform: rotate(20deg); }

        /* 主内容 */
        .main-container {
            position: relative; z-index: 1;
            max-width: 900px; margin: 0 auto;
            padding: 10px 24px 60px;
        }

        /* 欢迎区 */
        .hero { text-align: center; margin-bottom: 30px; padding: 10px 0; }
        .hero h1 {
            font-size: 2.2rem; font-weight: 700; margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p { color: var(--text-secondary); font-size: 1rem; max-width: 500px; margin: 0 auto; }

        /* 上传卡片 */
        .upload-card {
            background: var(--surface); border-radius: var(--radius-lg);
            padding: 0; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border); transition: var(--transition);
            overflow: hidden; min-height: 420px;
        }
        .upload-card:hover { box-shadow: 0 20px 50px rgba(0,0,0,0.15); }

        /* ===== 等待上传状态 ===== */
        .state-waiting {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px 40px; min-height: 420px;
        }

        /* 上传图标动画 */
        .upload-icon-wrapper {
            width: 100px; height: 100px;
            border-radius: 50%; position: relative;
            border: 4px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; transition: var(--transition);
        }
        .upload-icon-wrapper.dragover {
            border-color: var(--primary);
            transform: scale(1.05);
        }
        .upload-icon-wrapper::before {
            content: ''; position: absolute;
            width: calc(100% + 2px); height: calc(100% + 2px);
            top: -1px; left: -1px; border-radius: 50%;
            border: 1px solid var(--border);
            animation: bo 1.5s linear infinite;
            opacity: 0;
        }
        .upload-icon-wrapper.dragover::before {
            opacity: 1; border-color: var(--primary);
        }
        @keyframes bo {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .upload-icon-box {
            width: 70px; height: 70px; padding: 10px;
            overflow: hidden; border-radius: 50%;
        }
        .upload-icon-box svg { width: 100%; height: 100%; }

        .upload-hint {
            color: var(--text-secondary); font-size: 0.9rem;
            margin-bottom: 20px; text-align: center;
        }
        .upload-hint kbd {
            background: var(--surface-hover); border: 1px solid var(--border);
            border-radius: 4px; padding: 2px 8px;
            font-family: inherit; font-size: 0.85rem; color: var(--text);
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; border-radius: 40px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(2,151,248,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(2,151,248,0.5);
        }
        .btn-primary:active { transform: translateY(0); }

        .file-input { display: none; }

        /* ===== 上传中状态 ===== */
        .state-uploading {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px 40px; min-height: 420px;
        }
        .state-uploading.active { display: flex; }
        .uploading-icon {
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
        }
        .uploading-icon svg {
            width: 70px; height: 70px;
            animation: up 1s linear infinite;
        }
        @keyframes up {
            0% { transform: translateY(20px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
        .uploading-text {
            color: var(--text-secondary); font-size: 1rem;
            display: flex; align-items: center; gap: 8px;
        }
        .uploading-text .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 完成状态 ===== */
        .state-done {
            display: none; flex-direction: column;
            align-items: center; padding: 40px;
            min-height: 420px;
        }
        .state-done.active { display: flex; }
        .done-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; color: white; font-size: 2rem;
            box-shadow: 0 4px 20px rgba(16,185,129,0.4);
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .done-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
        .done-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }

        /* URL 复制区域 */
        .url-box {
            width: 100%; max-width: 500px;
            display: flex; align-items: center; gap: 12px;
        }
        .input-group {
            flex: 1; display: flex;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: var(--transition);
        }
        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2,151,248,0.1);
        }
        .url-input {
            flex: 1; border: none; background: transparent;
            padding: 12px 16px; font-size: 0.9rem;
            color: var(--text); outline: none;
            font-family: 'Fira Code', monospace;
        }
        .copy-btn {
            padding: 0 16px; border: none;
            background: var(--surface-hover);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); border-left: 1px solid var(--border);
        }
        .copy-btn:hover { background: var(--primary); color: white; }
        .copy-btn.copied { background: #10b981; color: white; }

        .reupload-btn {
            width: 44px; height: 44px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border); background: var(--surface);
            color: #d73a49; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 1.1rem;
        }
        .reupload-btn:hover {
            border-color: #d73a49; background: #fef0f0;
            transform: rotate(-180deg);
        }

        /* 多格式输出 */
        .format-tabs {
            display: flex; gap: 4px; margin-top: 20px;
            background: var(--border-light); padding: 4px;
            border-radius: var(--radius-sm);
        }
        .format-tab {
            padding: 8px 16px; border: none; background: transparent;
            color: var(--text-secondary); font-weight: 500;
            cursor: pointer; transition: var(--transition);
            border-radius: var(--radius-sm); font-size: 0.85rem;
        }
        .format-tab.active {
            background: var(--surface); color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .format-tab:hover:not(.active) { color: var(--text); }

        .format-content {
            width: 100%; max-width: 500px; margin-top: 12px;
            display: none;
        }
        .format-content.active { display: block; }
        .format-textarea {
            width: 100%; min-height: 80px; padding: 12px 16px;
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg); color: var(--text);
            font-family: 'Fira Code', monospace; font-size: 0.85rem;
            line-height: 1.6; resize: vertical;
            transition: var(--transition);
        }
        .format-textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2,151,248,0.1);
        }
        .format-actions {
            display: flex; gap: 10px; margin-top: 12px;
            justify-content: center;
        }
        .btn-small {
            padding: 8px 16px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 0.85rem; cursor: pointer;
            transition: var(--transition); font-weight: 500;
        }
        .btn-small:hover { background: var(--surface-hover); border-color: var(--primary); color: var(--primary); }

        /* ===== 错误状态 ===== */
        .state-error {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px 40px; min-height: 420px;
        }
        .state-error.active { display: flex; }
        .error-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; color: white; font-size: 2rem;
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .error-text { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
        .error-detail { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }

        /* 特性卡片 */
        .features {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-top: 40px;
        }
        .feature-card {
            background: var(--surface); border-radius: var(--radius);
            padding: 24px; border: 1px solid var(--border);
            transition: var(--transition); text-align: center;
        }
        .feature-card:hover {
            transform: translateY(-4px); box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        .feature-icon {
            width: 48px; height: 48px;
            background: var(--primary-light); border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 1.3rem;
            margin: 0 auto 12px;
        }
        .feature-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
        .feature-desc { font-size: 0.85rem; color: var(--text-secondary); }

        /* 页脚 */
        .footer {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted); font-size: 0.85rem;
            position: relative; z-index: 1;
        }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }

        /* Toast */
        .toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: var(--surface); border-radius: var(--radius-sm);
            padding: 14px 20px; box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--primary);
            display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s ease; min-width: 280px;
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.success { border-left-color: #10b981; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .hero h1 { font-size: 1.6rem; }
            .upload-card { margin: 0 -10px; border-radius: var(--radius); }
            .state-waiting, .state-uploading, .state-done, .state-error { padding: 30px 20px; }
            .url-box { flex-direction: column; }
            .reupload-btn { width: 100%; height: 44px; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <span>Telegraph-Image</span>
        </a>
        <nav class="nav-links">
            <a href="/admin" class="nav-link">
                <i class="fas fa-th-large"></i> 管理
            </a>
            <a href="https://github.com/cf-pages/Telegraph-Image" target="_blank" class="nav-link">
                <i class="fab fa-github"></i> GitHub
            </a>
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </header>

    <main class="main-container">
        <div class="hero">
            <h1>免费图片托管</h1>
            <p>简单、快速、无限容量的图片上传服务。支持拖拽、粘贴、多文件上传。</p>
        </div>

        <div class="upload-card" id="uploadCard">
            <!-- 等待上传 -->
            <div class="state-waiting" id="stateWaiting">
                <div class="upload-icon-wrapper" id="dropZone">
                    <div class="upload-icon-box">
                        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                            <path d="M422.4 704l-94.72-143.36c-15.36-23.04-46.08-30.72-71.68-15.36l-15.36 15.36-130.56 204.8c-12.8 25.6-7.68 56.32 17.92 71.68 7.68 5.12 17.92 7.68 25.6 7.68h256c28.16 0 51.2-23.04 51.2-51.2 0-7.68-2.56-15.36-5.12-23.04l-33.28-66.56z" fill="#A5C8F4"/>
                            <path d="M307.2 358.4c-43.52 0-76.8-33.28-76.8-76.8s33.28-76.8 76.8-76.8 76.8 33.28 76.8 76.8-33.28 76.8-76.8 76.8z m327.68-33.28c5.12-7.68 12.8-15.36 20.48-17.92 25.6-12.8 56.32 0 69.12 23.04L944.64 793.6c2.56 7.68 5.12 15.36 5.12 23.04 0 28.16-23.04 51.2-51.2 51.2H378.88c-10.24 0-20.48-2.56-30.72-10.24-23.04-15.36-28.16-48.64-12.8-71.68l56.32-79.36 243.2-381.44z" fill="#0297f8"/>
                        </svg>
                    </div>
                </div>
                <div class="upload-hint">
                    拖拽文件到此处，或 <kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴截图
                </div>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-folder-open"></i> 选择文件上传
                </button>
                <input type="file" id="fileInput" class="file-input" 
                       accept="image/jpeg,image/png,image/gif,video/mp4" multiple>
            </div>

            <!-- 上传中 -->
            <div class="state-uploading" id="stateUploading">
                <div class="uploading-icon">
                    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                        <path d="M554.666667 268.8v601.6h-85.333334V268.8L337.066667 401.066667 277.333333 341.333333 512 106.666667 746.666667 341.333333l-59.733334 59.733334L554.666667 268.8z" fill="#0297f8"/>
                    </svg>
                </div>
                <div class="uploading-text">
                    <div class="spinner"></div>
                    <span>正在上传，请稍等...</span>
                </div>
            </div>

            <!-- 上传完成 -->
            <div class="state-done" id="stateDone">
                <div class="done-icon"><i class="fas fa-check"></i></div>
                <div class="done-title">上传成功</div>
                <div class="done-subtitle">复制下面的链接，或选择其他格式</div>

                <div class="url-box">
                    <div class="input-group">
                        <input type="text" class="url-input" id="urlInput" readonly>
                        <button class="copy-btn" id="copyBtn" title="复制链接">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <button class="reupload-btn" id="reuploadBtn" title="重新上传">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>

                <div class="format-tabs">
                    <button class="format-tab active" data-format="url">URL</button>
                    <button class="format-tab" data-format="markdown">Markdown</button>
                    <button class="format-tab" data-format="html">HTML</button>
                    <button class="format-tab" data-format="bbcode">BBCode</button>
                </div>
                <div class="format-content active" id="fmt-url">
                    <textarea class="format-textarea" id="fmtUrlText" readonly></textarea>
                </div>
                <div class="format-content" id="fmt-markdown">
                    <textarea class="format-textarea" id="fmtMdText" readonly></textarea>
                </div>
                <div class="format-content" id="fmt-html">
                    <textarea class="format-textarea" id="fmtHtmlText" readonly></textarea>
                </div>
                <div class="format-content" id="fmt-bbcode">
                    <textarea class="format-textarea" id="fmtBbText" readonly></textarea>
                </div>
                <div class="format-actions">
                    <button class="btn-small" id="copyFmtBtn">
                        <i class="fas fa-copy"></i> 复制当前格式
                    </button>
                </div>
            </div>

            <!-- 错误状态 -->
            <div class="state-error" id="stateError">
                <div class="error-icon"><i class="fas fa-times"></i></div>
                <div class="error-text">上传失败</div>
                <div class="error-detail" id="errorDetail">请检查网络连接或文件格式后重试</div>
                <button class="btn-primary" id="retryBtn">
                    <i class="fas fa-redo"></i> 重新上传
                </button>
            </div>
        </div>

        <!-- 特性介绍 -->
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-infinity"></i></div>
                <div class="feature-title">无限容量</div>
                <div class="feature-desc">基于 Cloudflare 和 Telegram，无需担心存储空间</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                <div class="feature-title">极速上传</div>
                <div class="feature-desc">全球 CDN 加速，图片加载秒开</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-shield-alt"></i></div>
                <div class="feature-title">安全可靠</div>
                <div class="feature-desc">支持图片审核、黑白名单管理</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-images"></i></div>
                <div class="feature-title">支持视频</div>
                <div class="feature-desc">不仅支持图片，还支持 MP4 视频上传</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>基于 <a href="https://github.com/cf-pages/Telegraph-Image" target="_blank">Telegraph-Image</a> | 
        Powered by <a href="https://pages.cloudflare.com/" target="_blank">Cloudflare Pages</a></p>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== 主题切换 ====================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.className = 'fas fa-sun';
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.className = 'fas fa-moon';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.className = 'fas fa-sun';
            }
        });

        // ==================== 状态管理 ====================
        const states = {
            waiting: document.getElementById('stateWaiting'),
            uploading: document.getElementById('stateUploading'),
            done: document.getElementById('stateDone'),
            error: document.getElementById('stateError')
        };

        function switchState(stateName) {
            Object.values(states).forEach(el => el.classList.remove('active'));
            if (states[stateName]) {
                if (stateName === 'waiting') {
                    states.waiting.style.display = 'flex';
                    states.uploading.style.display = 'none';
                    states.done.style.display = 'none';
                    states.error.style.display = 'none';
                } else if (stateName === 'uploading') {
                    states.waiting.style.display = 'none';
                    states.uploading.style.display = 'flex';
                    states.done.style.display = 'none';
                    states.error.style.display = 'none';
                } else if (stateName === 'done') {
                    states.waiting.style.display = 'none';
                    states.uploading.style.display = 'none';
                    states.done.style.display = 'flex';
                    states.error.style.display = 'none';
                } else if (stateName === 'error') {
                    states.waiting.style.display = 'none';
                    states.uploading.style.display = 'none';
                    states.done.style.display = 'none';
                    states.error.style.display = 'flex';
                }
            }
        }

        // ==================== 拖拽上传 ====================
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadCard = document.getElementById('uploadCard');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            uploadCard.addEventListener(e, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(e => {
            uploadCard.addEventListener(e, () => dropZone.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(e => {
            uploadCard.addEventListener(e, () => dropZone.classList.remove('dragover'), false);
        });

        uploadCard.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFiles, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            if (dt.files.length) handleFiles({ target: { files: dt.files } });
        }

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            // 过滤不支持的格式
            const validFiles = files.filter(f => {
                const valid = f.type === 'image/jpeg' || f.type === 'image/png' || f.type === 'image/gif' || f.type === 'video/mp4';
                if (!valid) showToast('不支持的文件格式: ' + f.name, 'error');
                return valid;
            });

            if (validFiles.length) uploadFile(validFiles[0]);
        }

        // ==================== 粘贴上传 ====================
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const file = new File([blob], 'pasted-' + Date.now() + '.png', { type: blob.type });
                    uploadFile(file);
                    return;
                }
            }
        });

        // ==================== 核心上传逻辑 ====================
        function uploadFile(file) {
            switchState('uploading');

            const formData = new FormData();
            // Telegraph-Image 后端通常接受 "file" 或 "Files" 字段名
            formData.append('file', file);

            const xhr = new XMLHttpRequest();

            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    try {
                        let url = '';
                        const contentType = xhr.getResponseHeader('content-type');

                        // 尝试解析返回内容
                        if (contentType && contentType.includes('application/json')) {
                            const resp = JSON.parse(xhr.responseText);
                            // 处理多种可能的返回格式
                            if (resp.src) url = resp.src;
                            else if (resp.url) url = resp.url;
                            else if (resp.data && resp.data.src) url = resp.data.src;
                            else if (resp.data && resp.data.url) url = resp.data.url;
                            else if (Array.isArray(resp) && resp[0]) {
                                url = resp[0].src || resp[0].url || resp[0];
                            }
                        } else {
                            // 纯文本返回（直链）
                            url = xhr.responseText.trim();
                        }

                        // 确保 URL 完整
                        if (url && !url.startsWith('http') && !url.startsWith('//')) {
                            url = window.location.origin + (url.startsWith('/') ? '' : '/') + url;
                        }

                        if (url) {
                            showResult(url, file.name);
                            showToast('上传成功', 'success');
                        } else {
                            throw new Error('无法获取文件链接');
                        }
                    } catch (err) {
                        showError('解析返回数据失败: ' + err.message);
                    }
                } else {
                    showError('服务器返回错误: ' + xhr.status);
                }
            });

            xhr.addEventListener('error', () => showError('网络请求失败'));
            xhr.addEventListener('timeout', () => showError('请求超时'));

            xhr.open('POST', '/upload');
            xhr.setRequestHeader('Accept', 'application/json, text/plain, */*');
            xhr.send(formData);
        }

        // ==================== 结果显示 ====================
        function showResult(url, filename) {
            switchState('done');

            const urlInput = document.getElementById('urlInput');
            urlInput.value = url;

            // 填充各格式
            const isVideo = url.indexOf('.mp4') !== -1 || url.indexOf('.webm') !== -1 || url.indexOf('.mov') !== -1 || url.indexOf('video') !== -1;

            document.getElementById('fmtUrlText').value = url;
            document.getElementById('fmtMdText').value = isVideo 
                ? '[' + filename + '](' + url + ')'
                : '![' + filename + '](' + url + ')';
            document.getElementById('fmtHtmlText').value = isVideo
                ? '<video src="' + url + '" controls></video>'
                : '<img src="' + url + '" alt="' + filename + '">';
            document.getElementById('fmtBbText').value = isVideo
                ? '[video]' + url + '[/video]'
                : '[img]' + url + '[/img]';
        }

        function showError(msg) {
            switchState('error');
            document.getElementById('errorDetail').textContent = msg || '请检查网络连接或文件格式后重试';
            showToast(msg || '上传失败', 'error');
        }

        // ==================== 格式切换 ====================
        const formatTabs = document.querySelectorAll('.format-tab');
        const formatContents = document.querySelectorAll('.format-content');

        formatTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const fmt = tab.dataset.format;
                formatTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                formatContents.forEach(c => c.classList.remove('active'));
                document.getElementById('fmt-' + fmt).classList.add('active');
            });
        });

        // ==================== 复制功能 ====================
        function copyToClipboard(text, btn) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    if (btn) showCopied(btn);
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                if (btn) showCopied(btn);
            }
        }

        function showCopied(btn) {
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i>';
            btn.classList.add('copied');
            showToast('已复制到剪贴板', 'success');
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.remove('copied');
            }, 2000);
        }

        document.getElementById('copyBtn').addEventListener('click', function() {
            copyToClipboard(document.getElementById('urlInput').value, this);
        });

        document.getElementById('copyFmtBtn').addEventListener('click', () => {
            const activeTab = document.querySelector('.format-tab.active');
            const fmt = activeTab.dataset.format;
            const map = { url: 'fmtUrlText', markdown: 'fmtMdText', html: 'fmtHtmlText', bbcode: 'fmtBbText' };
            const textarea = document.getElementById(map[fmt]);
            copyToClipboard(textarea.value);
            showToast('已复制到剪贴板', 'success');
        });

        // ==================== 重新上传 ====================
        function resetUpload() {
            fileInput.value = '';
            document.getElementById('urlInput').value = '';
            ['Url', 'Md', 'Html', 'Bb'].forEach(function(s) {
                document.getElementById('fmt' + s + 'Text').value = '';
            });
            switchState('waiting');
        }

        document.getElementById('reuploadBtn').addEventListener('click', resetUpload);
        document.getElementById('retryBtn').addEventListener('click', resetUpload);

        // ==================== Toast ====================
        function showToast(message, type) {
            type = type || 'success';
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            const color = type === 'success' ? '#10b981' : '#ef4444';
            toast.innerHTML = '<i class="fas ' + icon + '" style="font-size:1.2rem;color:' + color + '"></i><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== 点击上传区域 ====================
        dropZone.addEventListener('click', (e) => {
            if (e.target !== fileInput) fileInput.click();
        });
    </script>
</body>
</html>
